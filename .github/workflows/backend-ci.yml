name: Backend CI

on:
  push:
    paths:
      - "flowlite-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "flowlite-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flowlite-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: flowlite-backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run smoke test
        run: npm test
